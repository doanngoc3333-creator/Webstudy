<!DOCTYPE HTML>
<html lang ="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, Helvetica, sans-serif;
    }

    body{
        background:linear-gradient(135deg,#74b9ff,#0984e3);
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    .box{
        background:white;
        width:360px;
        padding:35px;
        border-radius:18px;
        box-shadow:0 15px 30px rgba(0,0,0,.2);
        text-align:center;
    }

    h1{
        margin-bottom:25px;
        color:#2d3436;
        font-size:30px;
    }

    input{
        width:100%;
        padding:14px;
        margin:12px 0;
        border:1px solid #dfe6e9;
        border-radius:10px;
        font-size:16px;
        transition:.25s;
    }

    input:focus{
        outline:none;
        border-color:#0984e3;
        box-shadow:0 0 8px rgba(9,132,227,.35);
    }

    button{
        width:100%;
        padding:14px;
        margin-top:20px;
        background:#0984e3;
        color:white;
        border:none;
        border-radius:10px;
        font-size:17px;
        font-weight:bold;
        cursor:pointer;
        transition:.25s;
    }

    button:hover{
        background:#0769b7;
        transform:translateY(-2px);
    }

    a{
        text-decoration:none;
    }
</style>

</head>
    <body>
        <div class = "box">
            <h1>Sign your name</h1>
            <input type ="text" placeholder = "Sign in">
            <input type = "password" placeholder ="Enter your password">
            
        </body>
        <a href="lobby.html">
            <button >Sign in</button>
        </a>
        </div>
</html>
